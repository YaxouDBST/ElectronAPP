<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --rose-pastel:    #FFD6E7;
      --rose-moyen:     #FFB3D1;
      --fuchsia:        #FF4FA1;
      --fuchsia-clair:  #FF80BF;
      --creme:          #FFF9FB;
      --blanc:          #FFFFFF;
      --texte:          #5A2D4C;
      --texte-leger:    #C074A0;
      --ombre:          rgba(255, 79, 161, 0.18);
      --ombre-forte:    rgba(255, 79, 161, 0.32);
      --radius-btn:     50px;
      --radius-cell:    22px;
      --transition:     0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    html, body {
      width: 600px;
      height: 800px;
      overflow: hidden;
      background: var(--rose-pastel);
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      color: var(--texte);
      user-select: none;
    }

    /* ===== FOND ANIMÉ (bulles) ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 380px 320px at 20% 15%, #ffe0ef 0%, transparent 70%),
        radial-gradient(ellipse 300px 260px at 85% 75%, #ffc3df 0%, transparent 70%),
        radial-gradient(ellipse 250px 200px at 60% 40%, #fff0f7 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== CONTENEUR PRINCIPAL ===== */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      padding: 24px 30px 20px;
      gap: 16px;
    }

    /* ===== EN-TÊTE ===== */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .logo-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--blanc);
      box-shadow: 0 6px 20px var(--ombre-forte), 0 2px 6px var(--ombre);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      animation: floatLogo 3s ease-in-out infinite;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-7px); }
    }

    .logo-wrapper img {
      width: 70px;
      height: 70px;
      object-fit: contain;
    }

    h1 {
      font-size: 42px;
      font-weight: 900;
      color: var(--fuchsia);
      letter-spacing: 2px;
      text-shadow: 0 3px 10px var(--ombre-forte);
      line-height: 1;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 600;
      color: var(--texte-leger);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ===== BOUTONS DE MODE ===== */
    .mode-btns {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
    }

    .btn {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      border: none;
      outline: none;
      border-radius: var(--radius-btn);
      padding: 11px 22px;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
    }

    .btn-mode {
      background: var(--blanc);
      color: var(--fuchsia);
      box-shadow: 0 4px 14px var(--ombre);
      border: 2.5px solid var(--rose-moyen);
    }

    .btn-mode:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 22px var(--ombre-forte);
    }

    .btn-mode.active {
      background: linear-gradient(135deg, var(--fuchsia), var(--fuchsia-clair));
      color: var(--blanc);
      border-color: transparent;
      box-shadow: 0 6px 20px var(--ombre-forte);
    }

    .btn-mode.active:hover {
      transform: translateY(-3px) scale(1.04);
    }

    /* ===== STATUT ===== */
    .status-box {
      background: var(--blanc);
      border-radius: 50px;
      padding: 12px 28px;
      box-shadow: 0 4px 16px var(--ombre);
      min-width: 300px;
      text-align: center;
    }

    #status {
      font-size: 16px;
      font-weight: 800;
      color: var(--fuchsia);
      letter-spacing: 0.3px;
      min-height: 22px;
      display: block;
      transition: opacity 0.2s ease;
    }

    /* ===== INDICATEURS DE JOUEURS ===== */
    .players-row {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .player-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--blanc);
      border-radius: 50px;
      padding: 6px 16px 6px 8px;
      box-shadow: 0 3px 10px var(--ombre);
      opacity: 0.5;
      transition: opacity 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
    }

    .player-badge.active {
      opacity: 1;
      box-shadow: 0 5px 18px var(--ombre-forte);
      transform: scale(1.06);
    }

    .player-badge img {
      width: 26px;
      height: 26px;
      object-fit: contain;
    }

    .player-badge span {
      font-size: 13px;
      font-weight: 800;
      color: var(--texte);
    }

    .vs-text {
      font-size: 12px;
      font-weight: 800;
      color: var(--texte-leger);
    }

    /* ===== GRILLE ===== */
    .grid-wrapper {
      background: var(--blanc);
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 8px 30px var(--ombre-forte), 0 2px 8px var(--ombre);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 140px);
      grid-template-rows: repeat(3, 140px);
      gap: 10px;
    }

    .cell {
      width: 140px;
      height: 140px;
      background: var(--rose-pastel);
      border-radius: var(--radius-cell);
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px var(--ombre), inset 0 2px 4px rgba(255,255,255,0.8);
      transition:
        background var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
      overflow: hidden;
    }

    .cell:hover:not(.taken):not(.disabled) {
      background: var(--rose-moyen);
      transform: scale(1.05);
      box-shadow: 0 6px 18px var(--ombre-forte);
    }

    .cell:active:not(.taken):not(.disabled) {
      transform: scale(0.96);
    }

    .cell.taken {
      cursor: default;
    }

    .cell.disabled {
      cursor: not-allowed;
    }

    .cell img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      display: none;
      animation: popIn var(--transition) forwards;
    }

    @keyframes popIn {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      60%  { transform: scale(1.15) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .cell img.visible {
      display: block;
    }

    /* Cellule gagnante */
    .cell.winner {
      background: linear-gradient(135deg, #ffe066, #ffd700);
      box-shadow: 0 0 0 3px var(--fuchsia), 0 6px 20px rgba(255, 215, 0, 0.5);
      animation: winPulse 0.6s ease forwards;
    }

    @keyframes winPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.12); }
      70%  { transform: scale(0.97); }
      100% { transform: scale(1.05); }
    }

    /* ===== SCORES ===== */
    .scores {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .score-card {
      background: var(--blanc);
      border-radius: 20px;
      padding: 8px 20px;
      box-shadow: 0 3px 12px var(--ombre);
      text-align: center;
      min-width: 80px;
    }

    .score-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--texte-leger);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .score-value {
      font-size: 28px;
      font-weight: 900;
      color: var(--fuchsia);
      line-height: 1.1;
    }

    .score-sep {
      font-size: 22px;
      font-weight: 900;
      color: var(--rose-moyen);
    }

    /* ===== BOUTON REJOUER ===== */
    .btn-rejouer {
      background: linear-gradient(135deg, var(--fuchsia), var(--fuchsia-clair));
      color: var(--blanc);
      font-size: 15px;
      padding: 14px 44px;
      box-shadow: 0 6px 20px var(--ombre-forte);
      letter-spacing: 0.5px;
    }

    .btn-rejouer:hover {
      transform: translateY(-3px) scale(1.06);
      box-shadow: 0 10px 28px var(--ombre-forte);
    }

    .btn-rejouer:active {
      transform: scale(0.97);
    }

    /* ===== OVERLAY FIN DE PARTIE ===== */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 214, 231, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .overlay-card {
      background: var(--blanc);
      border-radius: 28px;
      padding: 30px 44px;
      box-shadow: 0 12px 40px var(--ombre-forte);
      text-align: center;
      animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes cardPop {
      from { transform: scale(0.7) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0);      opacity: 1; }
    }

    .overlay-emoji {
      font-size: 52px;
      line-height: 1;
    }

    .overlay-title {
      font-size: 26px;
      font-weight: 900;
      color: var(--fuchsia);
      margin-top: 8px;
    }

    .overlay-sub {
      font-size: 14px;
      font-weight: 600;
      color: var(--texte-leger);
      margin-top: 4px;
    }

    .btn-overlay {
      background: linear-gradient(135deg, var(--fuchsia), var(--fuchsia-clair));
      color: var(--blanc);
      font-size: 15px;
      padding: 14px 40px;
      box-shadow: 0 6px 20px var(--ombre-forte);
    }

    .btn-overlay:hover {
      transform: translateY(-3px) scale(1.06);
      box-shadow: 0 10px 28px var(--ombre-forte);
    }

    /* ===== IA "EN TRAIN DE RÉFLÉCHIR" ===== */
    .thinking-dots span {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--fuchsia);
      margin: 0 2px;
      animation: dot-bounce 1.1s ease-in-out infinite;
    }

    .thinking-dots span:nth-child(2) { animation-delay: 0.18s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <!-- OVERLAY FIN DE PARTIE -->
  <div id="overlay">
    <div class="overlay-card">
      <div class="overlay-emoji" id="overlay-emoji">🎉</div>
      <div class="overlay-title" id="overlay-title">Bravo !</div>
      <div class="overlay-sub"  id="overlay-sub">Tu as gagné !</div>
    </div>
    <button class="btn btn-overlay" id="btn-overlay-rejouer">🔄 Rejouer</button>
  </div>

  <div class="app">
    <!-- EN-TÊTE -->
    <div class="header">
      <div class="logo-wrapper">
        <img src="images/logo.png" alt="Logo Rachou" draggable="false" />
      </div>
      <h1>Rachou</h1>
      <p class="subtitle">Le Morpion Kawaii ✨</p>
    </div>

    <!-- BOUTONS DE MODE -->
    <div class="mode-btns">
      <button class="btn btn-mode active" id="btn-vs-ia">🤖 Joueur vs Ordinateur</button>
      <button class="btn btn-mode"        id="btn-vs-human">👫 Deux Joueurs</button>
    </div>

    <!-- STATUT -->
    <div class="status-box">
      <span id="status">Choisis un mode pour commencer !</span>
    </div>

    <!-- INDICATEURS DE JOUEURS -->
    <div class="players-row">
      <div class="player-badge active" id="badge-x">
        <img src="images/image1.png" alt="X" draggable="false" />
        <span id="badge-x-label">Toi</span>
      </div>
      <span class="vs-text">VS</span>
      <div class="player-badge" id="badge-o">
        <img src="images/image2.png" alt="O" draggable="false" />
        <span id="badge-o-label">Rachou</span>
      </div>
    </div>

    <!-- GRILLE -->
    <div class="grid-wrapper">
      <div class="grid" id="grid">
        <div class="cell" data-index="0">
          <img class="img-x" src="images/image1.png" alt="X" draggable="false" />
          <img class="img-o" src="images/image2.png" alt="O" draggable="false" />
        </div>
        <div class="cell" data-index="1">
          <img class="img-x" src="images/image1.png" alt="X" draggable="false" />
          <img class="img-o" src="images/image2.png" alt="O" draggable="false" />
        </div>
        <div class="cell" data-index="2">
          <img class="img-x" src="images/image1.png" alt="X" draggable="false" />
          <img class="img-o" src="images/image2.png" alt="O" draggable="false" />
        </div>
        <div class="cell" data-index="3">
          <img class="img-x" src="images/image1.png" alt="X" draggable="false" />
          <img class="img-o" src="images/image2.png" alt="O" draggable="false" />
        </div>
        <div class="cell" data-index="4">
          <img class="img-x" src="images/image1.png" alt="X" draggable="false" />
          <img class="img-o" src="images/image2.png" alt="O" draggable="false" />
        </div>
        <div class="cell" data-index="5">
          <img class="img-x" src="images/image1.png" alt="X" draggable="false" />
          <img class="img-o" src="images/image2.png" alt="O" draggable="false" />
        </div>
        <div class="cell" data-index="6">
          <img class="img-x" src="images/image1.png" alt="X" draggable="false" />
          <img class="img-o" src="images/image2.png" alt="O" draggable="false" />
        </div>
        <div class="cell" data-index="7">
          <img class="img-x" src="images/image1.png" alt="X" draggable="false" />
          <img class="img-o" src="images/image2.png" alt="O" draggable="false" />
        </div>
        <div class="cell" data-index="8">
          <img class="img-x" src="images/image1.png" alt="X" draggable="false" />
          <img class="img-o" src="images/image2.png" alt="O" draggable="false" />
        </div>
      </div>
    </div>

    <!-- SCORES -->
    <div class="scores">
      <div class="score-card">
        <div class="score-label" id="score-x-label">Toi (X)</div>
        <div class="score-value" id="score-x">0</div>
      </div>
      <div class="score-sep">·</div>
      <div class="score-card">
        <div class="score-label">Nuls</div>
        <div class="score-value" id="score-draw">0</div>
      </div>
      <div class="score-sep">·</div>
      <div class="score-card">
        <div class="score-label" id="score-o-label">Rachou (O)</div>
        <div class="score-value" id="score-o">0</div>
      </div>
    </div>

    <!-- REJOUER -->
    <button class="btn btn-rejouer" id="btn-rejouer">🔄 Rejouer</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
